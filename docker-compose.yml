services:
  otb:
    build: .
    restart: unless-stopped
    ports:
      - "6666:6666"                 # Public event API — tunnel trỏ vào đây
      - "127.0.0.1:6667:6667"       # Admin UI + /internal — CHỈ localhost host, KHÔNG tunnel
      - "127.0.0.1:4096:4096"       # OpenCode serve — CHỈ localhost host
    volumes:
      - ./data:/app/data
      - ./workspaces:/app/workspaces
      - opencode-state:/root/.local/share/opencode
      - opencode-config:/root/.config/opencode
    environment:
      - PORT=6666
      - ADMIN_PORT=6667
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}

volumes:
  opencode-state:
  opencode-config:
